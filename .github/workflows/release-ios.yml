name: Release iOS (TestFlight)

# 打 tag（v* 例如 v0.2.3）或手动触发 → 构建 App Store IPA 并上传 TestFlight。
# 需要在 repo Settings → Secrets and variables → Actions 配置以下 secrets：
#   ASC_KEY_ID          App Store Connect API 密钥 Key ID（须 Admin 角色）
#   ASC_ISSUER_ID       Issuer ID
#   ASC_TEAM_ID         Apple Team ID（R59Q7NXAWD）
#   ASC_KEY_P8_BASE64   .p8 私钥的 base64（本地：base64 -i AuthKey_XXX.p8 | pbcopy）
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-ios-${{ github.ref }}
  cancel-in-progress: false

jobs:
  testflight:
    name: Build & upload to TestFlight
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add iOS Rust target
        run: rustup target add aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare ASC API key + env
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEY_DIR="$HOME/appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          cat > .env.asc.local <<EOF
          ASC_KEY_ID=${ASC_KEY_ID}
          ASC_ISSUER_ID=${ASC_ISSUER_ID}
          ASC_KEY_PATH=${KEY_PATH}
          ASC_TEAM_ID=${ASC_TEAM_ID}
          ASC_APP_IDENTIFIER=com.shelf.reader
          EOF

      - name: Build App Store IPA + upload to TestFlight
        run: bash tools/release-ios-testflight.sh release
